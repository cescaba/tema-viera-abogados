name: Deploy to FTP

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Theme Files to FTP

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: ncipollo/ftp-deploy-action@v3.1.1
        with:
          host: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          localDir: ./
          remoteDir: /
          cleanContents: false
          exclude: |
            .git*
            .gitignore
            .github
            node_modules
            README.md
            INSTALLATION.md
            LICENSE
